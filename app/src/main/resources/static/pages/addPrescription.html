<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/images/logo/logo.png" />
    <title>Prescription</title>
    <!-- Load global stylesheet first -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- Load page-specific stylesheet -->
    <link rel="stylesheet" href="../assets/css/addPrescription.css">
    <!-- Load util.js first - defines setRole, getRole -->
    <script src="../js/util.js" defer></script>
    <!-- Load render.js - defines selectRole -->
    <script src="../js/render.js" defer></script>
    <!-- Load remaining scripts -->
    <script src="../js/components/header.js" defer></script>
    <script src="../js/components/footer.js" defer></script>
    <script type="module" src="../js/addPrescription.js" defer></script>
</head>
<body onload="renderContent()">
    <div class="container">
        <div class="wrapper">
            <div id="header"></div>
            <div class="main-content">
                <div class="form-container">
                    <h2 id="heading">Prescription</h2>
                    <script>
                        (function() {
                            const urlParams = new URLSearchParams(window.location.search);
                            let mode = urlParams.get("mode");
                            const role = localStorage.getItem("userRole");
                            if (role === "loggedPatient") mode = "view";
                            const initialMode = mode || (role === "doctor" ? "add" : "view");
                            const isView = initialMode === "view";
                            document.title = isView ? "View Prescription" : "Add Prescription";
                            const headingContent = isView ? "View <span>Prescription</span>" : "Add <span>Prescription</span>";
                            document.getElementById("heading").innerHTML = headingContent;
                            if (isView) {
                                document.write('<style>#savePrescription { display: none !important; }</style>');
                            }
                        })();
                    </script>
                    <form id="prescriptionForm">
                        <label for="patientName">Patient Name</label>
                        <input type="text" id="patientName" disabled>
                        <label for="medicines">Medicine Names</label>
                        <input type="text" id="medicines" placeholder="e.g. Paracetamol, Vitamin C" required>
                        <label for="dosage">Dosage Instructions</label>
                        <textarea id="dosage" rows="3" placeholder="e.g - Paracetamol"></textarea>
                        <label for="notes">Additional Notes</label>
                        <textarea id="notes" rows="3"
                            placeholder="Any precautions or observations (optional)"></textarea>
                        <button type="button" class="btn-primary" id="savePrescription">Save Prescription</button>
                        <button type="button" id="cancelBtn" class="btn-secondary">Cancel</button>
                    </form>
                </div>
            </div>
            <div id="footer"></div>
        </div>
    </div>
</body>
</html>
