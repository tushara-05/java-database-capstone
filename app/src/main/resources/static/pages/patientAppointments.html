<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../assets/images/logo/logo.png" />
  <title>Patient Appointments</title>
  <!-- Load global stylesheet first -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <!-- Load page-specific stylesheets -->
  <link rel="stylesheet" href="../assets/css/adminDashboard.css">
  <link rel="stylesheet" href="../assets/css/doctorDashboard.css">
  <!-- Load util.js first - defines setRole, getRole -->
  <script src="../js/util.js" defer></script>
  <!-- Load render.js - defines selectRole -->
  <script src="../js/render.js" defer></script>
  <!-- Load remaining scripts -->
  <script src="../js/components/header.js" defer></script>
  <script src="../js/components/footer.js" defer></script>
  <script type="module" src="../js/patientAppointment.js" defer></script>
</head>

<body onload="renderContent()">
  <div class="container">
    <div class="wrapper">
      <div id="header"></div>
      <div class="main-content">
        <h2>Patient <span>Appointment</span></h2>
        <input type="text" id="searchBar" class="searchBar" placeholder="Search by Doctor Name" />
        <div class="filter-wrapper">
          <select class="filter-select" id="appointmentFilter">
            <option value="allAppointments">All Appointments</option>
            <option value="future">Upcoming Appointments</option>
            <option value="past">Past Appointments</option>
          </select>
        </div>
        <table id="patientTable">
          <thead>
            <tr>
              <th>Patient Name</th>
              <th>Doctor Name</th>
              <th>Date</th>
              <th>Time</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="patientTableBody">
            <!-- rows will be inserted here dynamically -->
          </tbody>
        </table>
      </div>
      <div id="footer"></div>
    </div>
  </div>
</body>

</html>
