<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Role - Hospital CMS</title>
  <link rel="icon" type="image/png" href="assets/images/logo/logo.png">
  <link rel="stylesheet" href="assets/css/index.css">
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- Load utilities first - defines setRole, getRole -->
  <script src="js/util.js" defer></script>

  <!-- Load render.js - defines selectRole -->
  <script src="js/render.js" defer></script>


  <!-- Load remaining scripts -->
  <script src="js/components/header.js" defer></script>
  <script src="js/components/footer.js" defer></script>
</head>

<body>
  <div class="container">
    <div class="wrapper">
      <div id="header"></div>

      <main class="main-content">
        <h2>Select Your Role</h2>
        <div class="role-buttons">
          <button id="adminLogin" class="role-btn">Admin</button>
          <button id="doctorLogin" class="role-btn">Doctor</button>
          <button id="patientLogin" class="role-btn">Patient</button>
        </div>
      </main>

      <div id="footer"></div>
    </div>
  </div>

  <!-- Modal for login -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="closeModal" class="close">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Page-specific logic module for role selection -->
  <script type="module" src="js/services/index.js" defer></script>
</body>

</html>
