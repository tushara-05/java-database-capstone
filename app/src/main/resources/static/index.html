<!-- app/src/main/resources/static/index.html -->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Select Role</title>
  <link rel="icon" href="./assets/images/logo/logo.png" />
  <link rel="stylesheet" href="./assets/css/index.css" />
  <link rel="stylesheet" href="./assets/css/style.css" />

  <!-- Utility and rendering scripts -->
  <script src="./js/util.js" defer></script>
  <script src="./js/render.js" defer></script>

  <!-- Header and Footer components -->
  <script src="./js/components/header.js" defer></script>
  <script src="./js/components/footer.js" defer></script>

  <!-- Main page-specific logic -->
  <script type="module" src="./js/services/index.js" defer></script>
</head>

<body>
  <div class="container">
    <div class="wrapper">
      <div id="header"></div>

      <main class="main-content">
        <h2>Select Your <span class="highlight">Role</span></h2>

        <button id="adminBtn" class="role-button" onclick="selectRole('admin')">Admin</button>
        <button id="patientBtn" class="role-button" onclick="selectRole('patient')">Patient</button>
        <button id="doctorBtn" class="role-button" onclick="selectRole('doctor')">Doctor</button>
      </main>

      <div id="footer"></div>
    </div>
  </div>

  <!-- Modal for login/signup -->
  <div id="modal" class="modal" style="display:none;">
    <div class="modal-content">
      <span id="closeModal" class="close-button">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>
</body>

</html>
