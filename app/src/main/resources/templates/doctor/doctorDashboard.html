<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Dashboard</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/logo/logo.png}">
  <!-- Load global stylesheet first -->
  <link rel="stylesheet" th:href="@{/assets/css/style.css}">
  <!-- Load page-specific stylesheet -->
  <link rel="stylesheet" th:href="@{/assets/css/doctorDashboard.css}">
  <!-- Load util.js first - defines setRole, getRole -->
  <script th:src="@{/js/util.js}" defer></script>
  <!-- Load render.js - defines selectRole -->
  <script th:src="@{/js/render.js}" defer></script>
  <!-- Load header and footer components -->
  <script th:src="@{/js/components/header.js}" defer></script>
  <script th:src="@{/js/components/footer.js}" defer></script>
</head>

<body>
  <div class="container">
    <div class="wrapper">
      <div id="header"></div>

      <main class="main-content">
        <h2>Patient Management</h2>
        <!-- Search Bar -->
        <input type="text" id="searchBar" class="searchBar" placeholder="Search patients by name" />

        <!-- Filter Controls -->
        <div class="filter-section">
          <button id="todayButton" class="filter-btn">Today's Appointments</button>
          <input type="date" id="datePicker" class="date-picker" />
        </div>

        <!-- Patient Table -->
        <table id="patientTable" class="patient-table">
          <thead>
            <tr>
              <th>Patient ID</th>
              <th>Name</th>
              <th>Phone No.</th>
              <th>Email</th>
              <th>Prescription</th>
            </tr>
          </thead>
          <tbody id="patientTableBody">
            <!-- Dynamic content will be inserted here -->
          </tbody>
        </table>
      </main>

      <div id="footer"></div>
    </div>
  </div>

  <!-- Modal for Adding Prescription -->
  <div id="modal" class="modal">
    <span id="closeModal" class="close">&times;</span>
    <div id="modal-body"></div>
  </div>

  <!-- Load modals.js as module - defines openModal -->
  <script type="module">
    import { openModal } from "/js/components/modals.js";
    window.openModal = openModal;
  </script>

  <!-- Page-specific JavaScript module -->
  <script type="module" th:src="@{/js/doctorDashboard.js}" defer></script>
</body>

</html>
