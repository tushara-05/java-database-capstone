<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/logo/logo.png}">
  <!-- Load global stylesheet first -->
  <link rel="stylesheet" th:href="@{/assets/css/style.css}">
  <!-- Load page-specific stylesheet -->
  <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}">
  <!-- Load util.js first - defines setRole, getRole -->
  <script th:src="@{/js/util.js}" defer></script>
  <!-- Load render.js - defines selectRole -->
  <script th:src="@{/js/render.js}" defer></script>
  <!-- Load header and footer components -->
  <script th:src="@{/js/components/header.js}" defer></script>
  <script th:src="@{/js/components/footer.js}" defer></script>
</head>

<body>
  <div class="container">
    <div class="wrapper">
      <div id="header"></div>

      <main class="main-content">
        <h2>Manage Doctors</h2>
        <!-- Search Bar -->
        <input type="text" id="searchBar" class="searchBar" placeholder="Search by doctor name" />

        <!-- Filter Dropdowns -->
        <div class="filter-section">
          <select id="filterTime" class="filter-select">
            <option value="">Filter by Time</option>
            <option value="09:00-10:00">09:00 AM - 10:00 AM</option>
            <option value="10:00-11:00">10:00 AM - 11:00 AM</option>
            <option value="11:00-12:00">11:00 AM - 12:00 PM</option>
            <option value="12:00-13:00">12:00 PM - 13:00 PM</option>
            <option value="13:00-14:00">13:00 PM - 14:00 PM</option>
            <option value="14:00-15:00">14:00 PM - 15:00 PM</option>
            <option value="15:00-16:00">15:00 PM - 16:00 PM</option>
            <option value="16:00-17:00">16:00 PM - 17:00 PM</option>
          </select>

          <select id="filterSpeciality" class="filter-select">
            <option value="">Filter by Speciality</option>
            <option value="cardiologist">Cardiologist</option>
            <option value="dermatologist">Dermatologist</option>
            <option value="neurologist">Neurologist</option>
            <option value="pediatrician">Pediatrician</option>
            <option value="orthopedic">Orthopedic</option>
            <option value="gynecologist">Gynecologist</option>
            <option value="psychiatrist">Psychiatrist</option>
            <option value="dentist">Dentist</option>
            <option value="ophthalmologist">Ophthalmologist</option>
            <option value="ent">ENT Specialist</option>
            <option value="urologist">Urologist</option>
            <option value="oncologist">Oncologist</option>
            <option value="gastroenterologist">Gastroenterologist</option>
            <option value="general">General Physician</option>
          </select>
        </div>

        <!-- Content Area for Doctor Cards -->
        <div id="content"></div>
      </main>

      <div id="footer"></div>
    </div>
  </div>

  <!-- Modal for Adding Doctor -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="closeModal" class="close">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Load modals.js as module - defines openModal -->
  <script type="module">
    import { openModal } from "/js/components/modals.js";
    window.openModal = openModal;
  </script>

  <!-- Page-specific JavaScript modules -->
  <script type="module" th:src="@{/js/adminDashboard.js}" defer></script>
  <script type="module" th:src="@{/js/components/doctorCard.js}" defer></script>
</body>

</html>
