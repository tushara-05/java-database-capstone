<!-- app/src/main/resources/templates/admin/adminDashboard.html -->

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <link rel="icon" type="image/png" th:href="@{/assets/images/logo/logo.png}" />

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}" />
    <link rel="stylesheet" th:href="@{/assets/css/style.css}" />

    <!-- JS Utilities and Components -->
    <script th:src="@{/js/render.js}" defer></script>
    <script th:src="@{/js/util.js}" defer></script>
    <script th:src="@{/js/components/header.js}" defer></script>
    <script th:src="@{/js/components/footer.js}" defer></script>
</head>

<body onload="renderContent()">
    <div class="container">
        <div class="wrapper">
            <!-- Header placeholder -->
            <div id="header"></div>

            <!-- Main dashboard content -->
            <main class="main-content">
                <!-- Search bar -->
                <input type="text" id="searchBar" placeholder="Search by doctor name" />

                <!-- Filters -->
                <div class="filters">
                    <select id="timeFilter">
                        <option value="">Sort by Time</option>
                        <option value="morning">Morning (AM)</option>
                        <option value="afternoon">Afternoon (PM)</option>
                    </select>

                    <select id="specialtyFilter">
                        <option value="">Filter by Specialty</option>
                        <option value="cardiologist">Cardiologist</option>
                        <option value="dentist">Dentist</option>
                        <option value="dermatologist">Dermatologist</option>
                        <option value="neurologist">Neurologist</option>
                        <option value="pediatrician">Pediatrician</option>
                        <option value="orthopedic">Orthopedic</option>
                        <option value="gynecologist">Gynecologist</option>
                        <option value="psychiatrist">Psychiatrist</option>
                        <option value="ophthalmologist">Ophthalmologist</option>
                        <option value="ent">ENT Specialist</option>
                        <option value="urologist">Urologist</option>
                        <option value="oncologist">Oncologist</option>
                        <option value="gastroenterologist">Gastroenterologist</option>
                        <option value="general">General Physician</option>
                    </select>
                </div>

                <!-- Dynamic content for doctor cards -->
                <div id="content"></div>
            </main>

            <!-- Footer placeholder -->
            <div id="footer"></div>
        </div>
    </div>

    <!-- Modal for adding new doctor -->
    <div id="modal" class="modal" style="display:none;">
        <span id="closeModal" class="close">&times;</span>
        <div id="modal-body"></div>
    </div>

    <!-- Page-specific scripts -->
    <script type="module" src="../../static/js/services/adminDashboard.js" defer></script>
    <script type="module" src="../../static/js/components/doctorCard.js" defer></script>
</body>

</html>
